#docker run --name website-code-profile -p 80:80 -e AI_CHAT_URL=http://host.docker.internal:8080/chat -v $PWD/nginx.conf:/tmp/nginx.conf:ro -v $PWD/dist:/usr/share/nginx/html:ro nginx:latest sh -c "envsubst '`$AI_CHAT_URL' < /tmp/nginx.conf > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /chat {
            proxy_pass ${AI_CHAT_URL};
        }
    }
}